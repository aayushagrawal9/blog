# Site settings
title: Aayush Agrawal
tagline: "Personal blog and notes"
description: >-
  Personal blog of Aayush Agrawal — thoughts on software engineering, technology, and more.
url: "https://ouroboros.aayushagrawal.me"
baseurl: ""

# Author
author:
  name: Aayush Agrawal
  url: https://github.com/aayushagrawal9
  email: ""

# Social
github:
  username: aayushagrawal9
twitter:
  username: AgentAayush

# Build settings
permalink: /posts/:title/
paginate: 5

plugins:
  - jekyll-paginate
  - jekyll-seo-tag

# Markdown
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true
      start_line: 1

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: page

sass:
  style: compressed

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - Dockerfile
  - docker-compose.yml
  - Gemfile.lock
  - "package*.json"
  - .gitmodules
