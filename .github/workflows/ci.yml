name: "Build (CI)"
on:
  pull_request:
    branches:
      - main
      - master
      - "claude/**"
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build site with Docker
        run: |
          docker build -t blog-builder .
          docker run --rm \
            -v ${{ github.workspace }}/_site:/srv/jekyll/_site \
            -e JEKYLL_ENV=production \
            blog-builder \
            bundle exec jekyll build -d "_site${{ steps.pages.outputs.base_path }}"

      - name: Test site
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/_site:/srv/jekyll/_site \
            blog-builder \
            bundle exec htmlproofer _site \
              --disable-external \
              --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"
